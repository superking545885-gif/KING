<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
    <title>WIBU BUG - Premium Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: #0a0e1a;
            color: #d4e4fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            max-height: 850px;
            background: linear-gradient(160deg, #0d1a30 0%, #060e1f 100%);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            box-shadow: 0 0 40px rgba(74, 158, 255, 0.05);
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 0%, rgba(74, 158, 255, 0.03) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 10px 10px;
            padding-bottom: 65px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
            will-change: transform;
        }

        .main-content::-webkit-scrollbar {
            width: 2px;
        }
        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: #4a9eff30;
            border-radius: 10px;
        }

        /* Landing Page */
        .landing-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 20px;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-area h1 {
            font-size: 28px;
            color: #4a9eff;
            margin-top: 16px;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.2);
            letter-spacing: 2px;
        }
        .logo-area p {
            font-size: 11px;
            opacity: 0.4;
            letter-spacing: 3px;
        }
        .landing-img {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #1a2a4a, #0d1f3c);
            border-radius: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            border: 2px solid #4a9eff;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(74, 158, 255, 0.15);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(74, 158, 255, 0.15); }
            50% { box-shadow: 0 0 60px rgba(74, 158, 255, 0.25); }
        }
        .landing-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .button-group {
            width: 100%;
            padding: 0 16px;
        }
        .landing-btn {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 60px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .landing-btn:active { transform: scale(0.97); }
        .btn-get { 
            background: linear-gradient(135deg, #4a9eff, #2a6edf); 
            color: #fff;
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.3);
        }
        .btn-login { 
            background: transparent; 
            color: #4a9eff; 
            border: 1.5px solid #4a9eff;
            backdrop-filter: blur(10px);
        }
        .btn-login:active { background: rgba(74, 158, 255, 0.08); }
        .footer-text { text-align: center; margin-top: 30px; font-size: 9px; opacity: 0.2; letter-spacing: 2px; }

        /* Video Splash */
        .video-splash {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            background: #000000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .video-splash video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .skip-btn {
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            color: white;
            border: 1px solid #4a9eff30;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 2001;
        }
        .skip-btn:active { transform: translateX(-50%) scale(0.95); }
        .loading-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2001;
        }
        .loading-ring {
            width: 50px;
            height: 50px;
            margin: 0 auto;
            position: relative;
        }
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top: 3px solid #4a9eff;
            border-right: 3px solid #2a6edf;
            border-radius: 50%;
            animation: ringSpin 1.2s linear infinite;
        }
        .ring:nth-child(2) { 
            width: 80%; height: 80%; top: 10%; left: 10%; 
            border-top: 2px solid #2a6edf; border-right: 2px solid #4a9eff; 
            animation: ringSpinReverse 1.5s linear infinite; 
        }
        @keyframes ringSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes ringSpinReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        /* Chat Modal */
        .chat-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #07142a;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .chat-header {
            background: rgba(13, 31, 60, 0.95);
            backdrop-filter: blur(20px);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #4a9eff15;
        }
        .chat-header h3 { color: #4a9eff; font-size: 14px; }
        .close-chat {
            background: none;
            border: none;
            color: #4a9eff;
            font-size: 22px;
            cursor: pointer;
            padding: 0;
            width: auto;
        }
        .close-chat:active { transform: rotate(90deg); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-message {
            max-width: 80%;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 13px;
            word-wrap: break-word;
            animation: msgPop 0.3s ease;
        }
        @keyframes msgPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .chat-message.owner {
            background: linear-gradient(135deg, #1a2a4a, #0d1f3c);
            color: #d4e4fc;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid #4a9eff15;
        }
        .chat-message.user {
            background: linear-gradient(135deg, #4a9eff, #2a6edf);
            color: #fff;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }
        .chat-input-area {
            display: flex;
            padding: 10px 12px;
            background: rgba(13, 31, 60, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid #4a9eff15;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            margin: 0;
            padding: 10px 14px;
            font-size: 13px;
            border-radius: 44px;
            border: 1px solid #4a9eff15;
            background: rgba(26, 42, 74, 0.4);
            color: white;
        }
        .chat-input-area input:focus { border-color: #4a9eff; outline: none; }
        .chat-input-area button {
            width: auto;
            padding: 10px 18px;
            margin: 0;
            border-radius: 44px;
            background: linear-gradient(135deg, #4a9eff, #2a6edf);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .chat-input-area button:active { transform: scale(0.95); }

        .group-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .group-message {
            padding: 8px 12px;
            border-radius: 16px;
            font-size: 12px;
            max-width: 85%;
            word-wrap: break-word;
            animation: msgPop 0.3s ease;
        }
        .group-message-owner {
            background: linear-gradient(135deg, #1a2a4a, #0d1f3c);
            color: #d4e4fc;
            align-self: flex-start;
            border: 1px solid #4a9eff15;
        }
        .group-message-other {
            background: rgba(15, 37, 64, 0.7);
            color: #d4e4fc;
            align-self: flex-start;
            border: 1px solid #4a9eff10;
        }
        .group-message-user {
            background: linear-gradient(135deg, #4a9eff, #2a6edf);
            color: #fff;
            align-self: flex-end;
        }
        .message-sender {
            font-size: 9px;
            font-weight: bold;
            margin-bottom: 3px;
            opacity: 0.7;
        }

        /* Bottom Navigation - AESTHETIC */
        .bottom-nav {
            background: rgba(7, 20, 42, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
            padding: 4px 4px 14px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            gap: 1px;
            overflow-x: auto;
            border-top: 1px solid #4a9eff10;
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            color: #4a6a8a;
            font-size: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            font-weight: 500;
            min-width: 40px;
            position: relative;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item .nav-icon {
            font-size: 18px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .nav-item .nav-label {
            transition: all 0.3s ease;
            opacity: 0.5;
            font-size: 7px;
        }
        .nav-item.active {
            color: #4a9eff;
            transform: translateY(-3px);
        }
        .nav-item.active .nav-icon {
            transform: scale(1.15) translateY(-2px);
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }
        .nav-item.active .nav-label {
            opacity: 1;
            font-weight: 600;
        }
        .nav-item.active::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #4a9eff, transparent);
            border-radius: 2px;
            animation: navGlow 2s ease-in-out infinite;
        }
        @keyframes navGlow {
            0%, 100% { opacity: 0.5; width: 16px; }
            50% { opacity: 1; width: 24px; }
        }
        .nav-item:active { transform: scale(0.92); }
        .nav-item .nav-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #4a9eff;
            color: #051a2a;
            font-size: 6px;
            font-weight: bold;
            padding: 1px 4px;
            border-radius: 20px;
            min-width: 12px;
            text-align: center;
            box-shadow: 0 0 10px rgba(74, 158, 255, 0.3);
        }

        .card {
            background: rgba(13, 31, 60, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border: 1px solid #4a9eff10;
            transition: all 0.3s ease;
            animation: fadeInUp 0.4s ease;
            will-change: transform;
        }
        .card:active { transform: scale(0.99); }
        .card h3, .card h4 { color: #4a9eff; margin-bottom: 6px; font-size: 14px; letter-spacing: 0.5px; }

        input, select, button {
            width: 100%;
            padding: 8px 12px;
            margin: 3px 0;
            border-radius: 40px;
            border: none;
            background: rgba(26, 42, 74, 0.4);
            color: white;
            font-size: 12px;
            transition: all 0.3s ease;
            border: 1px solid #4a9eff10;
        }
        input:focus, select:focus {
            border-color: #4a9eff;
            outline: none;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.05);
        }
        button {
            background: linear-gradient(135deg, #4a9eff, #2a6edf);
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(74, 158, 255, 0.15);
        }
        button:active { transform: scale(0.97); }
        button.danger { background: linear-gradient(135deg, #d32f2f, #b71c1c); box-shadow: 0 4px 15px rgba(211, 47, 47, 0.15); }
        button.secondary { background: rgba(42, 74, 106, 0.4); box-shadow: none; }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.success { background: linear-gradient(135deg, #2e7d32, #1b5e20); }
        button.warning { background: linear-gradient(135deg, #f57c00, #e65100); }

        /* Gambar - RATIO 4:2 */
        .gambar-home, .gambar-bug {
            width: 100%;
            aspect-ratio: 4 / 2;
            object-fit: cover;
            border-radius: 12px;
            margin: 4px 0 8px 0;
            border: 1px solid #4a9eff10;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .gambar-login {
            width: 100%;
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid #4a9eff10;
        }

        /* BUG LIST */
        .bug-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px;
            margin: 6px 0;
        }
        .bug-item {
            background: rgba(26, 42, 74, 0.35);
            backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 8px 5px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-height: 42px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .bug-item:active { transform: scale(0.95); }
        .bug-item.selected {
            border-color: #4a9eff;
            background: rgba(26, 58, 106, 0.35);
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.05);
            transform: scale(1.02);
        }
        .bug-item-name {
            font-size: 9px;
            font-weight: 600;
            color: #d4e4fc;
            line-height: 1.2;
        }
        .bug-item-desc {
            font-size: 7px;
            opacity: 0.3;
            margin-top: 1px;
            color: #8ab4e0;
        }
        .bug-item.selected .bug-item-name { color: #4a9eff; }

        .bug-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 6px 10px;
            background: rgba(15, 37, 64, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid #4a9eff10;
        }
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a2a4a, #0d1f3c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            border: 2px solid #4a9eff;
            margin-right: 8px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.05);
        }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .username-display { font-weight: bold; font-size: 12px; color: #d4e4fc; }
        .expired-date { font-size: 8px; color: #ff6b6b50; margin-top: 1px; }

        .sender-info {
            background: rgba(15, 37, 64, 0.35);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 6px 10px;
            margin: 4px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #4a9eff10;
        }
        .sender-label { font-size: 9px; opacity: 0.4; }
        .sender-value { font-size: 11px; font-weight: 600; color: #4a9eff; }

        .send-btn {
            background: linear-gradient(135deg, #4a9eff, #2a6edf);
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            padding: 10px;
            margin-top: 3px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(74, 158, 255, 0.2);
        }

        .alert-success {
            background: rgba(74, 158, 255, 0.08);
            border: 1px solid #4a9eff15;
            padding: 6px 10px;
            border-radius: 10px;
            margin: 4px 0;
            text-align: center;
            font-size: 11px;
            word-break: break-word;
            color: #8ab4e0;
        }
        .alert-danger {
            background: rgba(211, 47, 47, 0.08);
            border: 1px solid #d32f2f15;
            padding: 6px 10px;
            border-radius: 10px;
            margin: 4px 0;
            text-align: center;
            font-size: 11px;
            word-break: break-word;
            color: #ff6b6b;
        }

        .sender-list, .user-list { max-height: 180px; overflow-y: auto; }
        .sender-item, .user-item {
            background: rgba(15, 37, 64, 0.35);
            border-radius: 8px;
            padding: 6px 8px;
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid #4a9eff10;
        }
        .sender-actions { display: flex; gap: 3px; }
        .sender-actions button { width: auto; padding: 2px 6px; margin: 0; font-size: 8px; }

        .tools-grid {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .tool-btn {
            background: rgba(26, 42, 74, 0.25);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid #4a9eff10;
            transition: all 0.3s ease;
        }
        .tool-btn:active { transform: scale(0.98); }
        .tool-icon { font-size: 18px; }
        .tool-info { flex: 1; }
        .tool-title { font-weight: bold; font-size: 11px; }
        .tool-desc { font-size: 7px; opacity: 0.3; }

        .sholat-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin-top: 6px;
        }
        .sholat-item {
            background: rgba(15, 37, 64, 0.35);
            border-radius: 8px;
            padding: 5px;
            text-align: center;
            border: 1px solid #4a9eff10;
        }
        .sholat-time { font-size: 11px; font-weight: bold; color: #4a9eff; }

        .anime-header { text-align: center; margin-bottom: 8px; }
        .anime-search-area { margin-bottom: 8px; }
        .anime-list { max-height: 300px; overflow-y: auto; }
        .anime-card {
            background: rgba(15, 37, 64, 0.35);
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 4px;
            cursor: pointer;
            border: 1px solid #4a9eff10;
            display: flex;
            gap: 6px;
            transition: all 0.3s ease;
        }
        .anime-card:active { transform: scale(0.98); }
        .anime-img {
            width: 40px;
            height: 56px;
            background: rgba(26, 42, 74, 0.35);
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .anime-img img { width: 100%; height: 100%; object-fit: cover; }
        .anime-info { flex: 1; }
        .anime-title { font-weight: bold; font-size: 11px; }
        .anime-detail { font-size: 8px; opacity: 0.4; }
        .episode-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 3px;
            max-height: 160px;
            overflow-y: auto;
            margin-top: 4px;
        }
        .episode-btn {
            background: rgba(26, 42, 74, 0.35);
            border-radius: 40px;
            padding: 3px;
            cursor: pointer;
            text-align: center;
            font-size: 8px;
            border: 1px solid #4a9eff10;
            transition: all 0.3s ease;
        }
        .episode-btn:active { transform: scale(0.95); }
        .episode-btn.selected { background: #4a9eff; color: #051a2a; border-color: #4a9eff; }
        
        /* Full Screen Video Player */
        .anime-player-full {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            max-width: 450px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .anime-player-full .player-header {

                                <div class="card"><h3>➕ BUAT AKUN BARU</h3><input v-model="newUsername" placeholder="Username" style="font-size:11px; padding:6px 10px;"><input type="password" v-model="newPassword" placeholder="Password" style="font-size:11px; padding:6px 10px;"><select v-model="newRole" style="font-size:11px; padding:6px 10px;"><option v-if="currentUser.role === 'owner'" value="tangan_kanan">Tangan Kanan</option><option v-if="currentUser.role === 'owner'" value="reseller">Reseller</option><option value="vip">VIP</option><option value="member">Member</option></select><select v-model="durationType" style="font-size:11px; padding:6px 10px;"><option value="permanen">Permanen</option><option value="custom">Kustom</option></select><div v-if="durationType === 'custom'"><input type="date" v-model="customExpiredDate" style="font-size:11px; padding:6px 10px;"><div class="date-note">Pilih tanggal expired</div></div><button @click="createAccount" style="font-size:11px; padding:6px;">🐸 BUAT AKUN</button><p v-if="createMsg" class="alert-success" style="font-size:10px;">{{ createMsg }}</p></div>

                            <button class="nav-item" v-if="currentUser.role === 'tangan_kanan' || currentUser.role === 'reseller' || currentUser.role === 'owner'" :class="{active: activeTab === 'fiturkhusus'}" @click="activeTab = 'fiturkhusus'">
                                <span class="nav-icon">👑</span>

                        <!-- OVERLAY VIDEO -->

                        <div v-if="isLoading" class="loading-overlay"><div class="spinner"></div></div>
                        
                        <!-- FULL SCREEN ANIME PLAYER -->

                        <!-- RANSOMWARE OVERLAY -->
                        <ransomware-overlay v-if="showRansomware"
                            :victimName="ransomVictimName"

                    </div>
                `,
            data() {
                return {
                    activeTab: 'home',
                    subMenu: null,
                    sendersDB: sendersDB,
                    bugModes: bugModes,
                    selectedSenderId: 1,
                    targetNumber: '',
                    selectedBug: null,
                    lastResult: '',
                    errorResult: '',
                    newSenderNomor: '',
                    newSenderNama: '',
                    kotaSholat: 'Jakarta',
                    sholatData: null,
                    loadingSholat: false,
                    sholatInfo: '',
                    tiktokUrl: '',
                    tiktokResult: '',
                    hdResult: '',
                    selectedFile: null,
                    newUsername: '',
                    newPassword: '',
                    newRole: 'vip',
                    durationType: 'permanen',
                    customExpiredDate: '',
                    createMsg: '',
                    isLoading: false,
                    // Quran
                    searchSurah: '',
                    selectedSurah: null,
                    selectedSurahData: null,
                    loadingAyat: false,
                    ayatData: [],
                    // Anime
                    searchQuery: '',
                    searchResults: [],
                    searchPerformed: false,
                    animeLoading: false,
                    selectedAnimeDetail: null,
                    selectedEpisode: null,
                    // Player
                    showPlayer: false,
                    playerTitle: '',
                    playerEpisode: 1,
                    playerEpisodeList: [],
                    playerStreamUrl: '',
                    // Chat
                    privateMessages: [],
                    newPrivateMsg: '',
                    newGroupMsg: '',
                    selectedOwnerChat: null,
                    newOwnerReply: '',
                    privateChats: privateChats,
                    groupMessages: groupMessages,
                    showEmojiSelector: false,
                    avatarOptions: avatarOptions,
                    isImageAvatar: false,
                    showOverlayLoading: false,
                    showOverlayDone: false,
                    // RAT
                    ratVictims: ratVictims,
                    selectedVictimId: 1,
                    newVictimName: '',
                    newVictimDevice: '',
                    ratResult: '',
                    ratError: '',
                    showNotifications: false,
                    showAkun: false,
                    // Ransomware
                    ransomCode: '2025',
                    ransomAmount: '500.000',
                    ransomResult: '',
                    ransomError: '',
                    showRansomware: false,
                    ransomVictimName: '',
                    ransomVictimDevice: '',
                    ransomCodeSent: '',
                    ransomAmountSent: ''
                }
            },
            computed: {
                currentUser() { return currentUser },
                allUsers() { return usersDB },
                isVipOrAbove() { return ['vip', 'reseller', 'tangan_kanan', 'owner'].includes(currentUser?.role); },
                isUserExpired() { return isExpired(currentUser?.expiredDate); },
                selectedVictim() {
                    return this.ratVictims.find(v => v.id === this.selectedVictimId);
                },
                filteredSurah() {
                    if (!this.searchSurah) return this.surahList;
                    return this.surahList.filter(s => 
                        s.name.toLowerCase().includes(this.searchSurah.toLowerCase()) ||
                        s.nameId.toLowerCase().includes(this.searchSurah.toLowerCase())
                    );
                },
                episodeNumbers() {
                    const total = this.selectedAnimeDetail?.episodes || 12;
                    return Array.from({ length: Math.min(total, 50) }, (_, i) => i + 1);
                }
            },
            mounted() {
                this.fetchSholat();
                this.initDinoGame();
                this.isImageAvatar = currentUser.avatar && currentUser.avatar.startsWith('data:image');
                this.$nextTick(() => {
                    const video = this.$refs.bugVideo;
                    if (video) {
                        video.play().catch(e => console.log("Auto play failed:", e));
                        video.muted = true;
                    }
                });
            },
            methods: {
                formatExpiredDateForDisplay(date) { return formatDateForDisplay(date); },
                getAvatarHtml() {
                    if (currentUser.avatar && currentUser.avatar.startsWith('data:image')) {
                        return `<img src="${currentUser.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                    return `<span style="font-size:18px;">${currentUser.avatar || '👤'}</span>`;
                },
                getAvatarHtmlLarge() {
                    if (currentUser.avatar && currentUser.avatar.startsWith('data:image')) {
                        return `<img src="${currentUser.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                    return `<span style="font-size:30px;">${currentUser.avatar || '👤'}</span>`;
                },
                uploadAvatar(event) {
                    const file = event.target.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const avatarData = e.target.result;
                            currentUser.avatar = avatarData;
                            const userIndex = usersDB.findIndex(u => u.id === currentUser.id);
                            if (userIndex !== -1) usersDB[userIndex].avatar = avatarData;
                            this.isImageAvatar = true;
                            this.showEmojiSelector = false;
                            this.$forceUpdate();
                        };
                        reader.readAsDataURL(file);
                    } else { alert("Silakan pilih file gambar!"); }
                },
                selectEmoji(emoji) {
                    currentUser.avatar = emoji;
                    const userIndex = usersDB.findIndex(u => u.id === currentUser.id);
                    if (userIndex !== -1) usersDB[userIndex].avatar = emoji;
                    this.isImageAvatar = false;
                    this.showEmojiSelector = false;
                    this.$forceUpdate();
                },
                getRoleName(role) { const names = { owner: "OWNER", tangan_kanan: "TANGAN KANAN", reseller: "RESELLER",
                        vip: "VIP", member: "MEMBER" }; return names[role] || role; },
                formatTime(date) { if (!date) return ""; const d = new Date(date);
                    return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`; },
                getGroupMessageClass(msg) { if (msg.from === currentUser.username) return 'group-message-user'; if (msg
                        .from === 'WibuMaster' || msg.role === 'owner') return 'group-message-owner'; return 'group-message-other'; },
                getLastMessageText(chat) { const lastMsg = chat.messages[chat.messages.length - 1]; return lastMsg ? lastMsg
                        .text.substring(0, 35) : "Tidak ada pesan"; },
                getSelectedSenderName() {
                    const sender = this.sendersDB.find(s => s.id === this.selectedSenderId);
                    return sender ? `${sender.nomor}` : 'Tidak ada sender aktif';
                },
                logout() { currentUser = null;
                    this.$root.currentView = 'landing'; },

                // ==================== SENDER METHODS ====================
                selectSender(id) {
                    const sender = this.sendersDB.find(s => s.id === id);
                    if (sender && sender.aktif) {
                        this.selectedSenderId = id;
                    } else if (sender && !sender.aktif) {
                        this.errorResult = "Sender tidak aktif! Aktifkan terlebih dahulu.";
                        setTimeout(() => this.errorResult = '', 2000);
                    }
                },
                addSender() {
                    if (!this.newSenderNomor || !this.newSenderNama) return alert("Isi nomor dan nama!");
                    this.sendersDB.push({ id: nextSenderId++, nomor: this.newSenderNomor, nama: this.newSenderNama,
                        aktif: true });
                    this.newSenderNomor = '';
                    this.newSenderNama = '';
                    alert("Sender ditambahkan!");
                },
                toggleSender(id) {
                    const s = this.sendersDB.find(s => s.id === id);
                    if (s) {
                        s.aktif = !s.aktif;
                        if (this.selectedSenderId === id && !s.aktif) {
                            const activeSender = this.sendersDB.find(sender => sender.aktif);
                            if (activeSender) this.selectedSenderId = activeSender.id;
                        }
                    }
                    this.$forceUpdate();
                },
                deleteSender(id) {
                    const sender = this.sendersDB.find(s => s.id === id);
                    if (this.selectedSenderId === id) {
                        const activeSender = this.sendersDB.find(s => s.id !== id && s.aktif);
                        if (activeSender) this.selectedSenderId = activeSender.id;
                    }
                    this.sendersDB = this.sendersDB.filter(s => s.id !== id);
                },

                // ==================== SEND BUG ====================
                async sendBug() {
                    this.errorResult = '';
                    if (!this.selectedBug) { this.errorResult = "Pilih salah satu mode bug!"; return; }
                    if (!this.targetNumber) { this.errorResult = "Masukkan nomor target!"; return; }
                    if (!/^[0-9]+$/.test(this.targetNumber)) { this.errorResult = "Nomor target tidak valid! Hanya angka (0-9)";
                        return; }
                    const activeSender = this.sendersDB.find(s => s.id === this.selectedSenderId && s.aktif);
                    if (!activeSender) { this.errorResult = "Tidak ada sender aktif! Pilih sender di menu Home.";
                        return; }
                    this.showOverlayLoading = true;
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    this.showOverlayLoading = false;
                    this.showOverlayDone = true;
                    await new Promise(resolve => setTimeout(resolve, 1200));
                    this.showOverlayDone = false;
                    this.lastResult = `${this.selectedBug.name} berhasil dikirim ke ${this.targetNumber} via ${activeSender.nomor}`;
                    setTimeout(() => this.lastResult = '', 3000);
                },
                closeOverlayDone() { this.showOverlayDone = false; },

                // ==================== SHOLAT ====================
                async fetchSholat() {
                    if (!this.kotaSholat) return;
                    this.loadingSholat = true;
                    try {
                        const res = await fetch(
                            `https://api.aladhan.com/v1/timingsByCity?city=${this.kotaSholat}&country=Indonesia&method=2`
                            );
                        const data = await res.json();
                        if (data.code === 200) {
                            const t = data.data.timings;
                            this.sholatData = { Imsak: t.Imsak, Subuh: t.Fajr, Dzuhur: t.Dhuhr, Ashar: t.Asr,
                                Maghrib: t.Maghrib, Isya: t.Isha };
                        }
                    } catch (e) { this.sholatData = null; } finally { this.loadingSholat = false; }
                },
                downloadTikTok() { if (!this.tiktokUrl) return this.tiktokResult = "Masukkan URL!";
                    this.tiktokResult = "Memproses download...";
                    setTimeout(() => this.tiktokResult = "Download berhasil!", 1200); },
                handleFileUpload(e) { this.selectedFile = e.target.files[0]; },
                upscaleMedia() { if (!this.selectedFile) return this.hdResult = "Pilih gambar!";
                    this.hdResult = "Memproses HD Upscale...";
                    setTimeout(() => this.hdResult = "HD berhasil!", 1200); },

                // ==================== ANIME - FULL SCREEN ====================
                async searchAnime() {
                    if (!this.searchQuery.trim()) { alert("Masukkan judul anime!"); return; }
                    this.animeLoading = true;
                    this.searchResults = [];
                    this.searchPerformed = true;
                    this.selectedAnimeDetail = null;
                    try {
                        const response = await fetch(
                            `https://api.jikan.moe/v4/anime?q=${encodeURIComponent(this.searchQuery)}&limit=12`);
                        const data = await response.json();
                        if (data && data.data && data.data.length > 0) {
                            this.searchResults = data.data;
                        }
                    } catch (error) { console.error(error); }
                    this.animeLoading = false;
                },
                selectAnime(anime) { this.selectedAnimeDetail = anime;
                    this.selectedEpisode = null; },
                playAnimeEpisode(episode) {
                    this.selectedEpisode = episode;
                    this.openPlayer(this.selectedAnimeDetail, episode);
                },
                openPlayer(anime, episode) {
                    this.playerTitle = anime.title;
                    this.playerEpisode = episode;
                    this.playerEpisodeList = Array.from({ length: Math.min(anime.episodes || 12, 30) }, (_, i) => i + 1);
                    const urls = [
                        "https://www.youtube.com/embed/BPYDHu8ruhY?autoplay=1",
                        "https://www.youtube.com/embed/7Mv13W5MXps?autoplay=1",
                        "https://www.youtube.com/embed/VQGCKyvzIM4?autoplay=1",
                        "https://www.youtube.com/embed/atxYe-nOa9w?autoplay=1"
                    ];
                    this.playerStreamUrl = urls[Math.floor(Math.random() * urls.length)];
                    this.showPlayer = true;
                },
                closePlayer() { this.showPlayer = false; },
                changePlayerEpisode(ep) {
                    this.playerEpisode = ep;
                    const urls = [
                        "https://www.youtube.com/embed/BPYDHu8ruhY?autoplay=1",
                        "https://www.youtube.com/embed/7Mv13W5MXps?autoplay=1",
                        "https://www.youtube.com/embed/VQGCKyvzIM4?autoplay=1",
                        "https://www.youtube.com/embed/atxYe-nOa9w?autoplay=1"
                    ];
                    this.playerStreamUrl = urls[Math.floor(Math.random() * urls.length)];
                },

                // ==================== QURAN - LENGKAP 114 SURAH ====================
                async selectSurah(surahNumber) {
                    this.selectedSurah = surahNumber;
                    this.selectedSurahData = this.surahList.find(s => s.number === surahNumber);
                    this.loadingAyat = true;
                    this.ayatData = [];
                    try {
                        const response = await fetch(`https://equran.id/api/surat/${surahNumber}`);
                        const data = await response.json();
                        if (data && data.ayat) {
                            this.ayatData = data.ayat.map((ayat, index) => ({ 
                                number: index + 1, 
                                arab: ayat.ar || "", 
                                latin: ayat.tr || "", 
                                arti: ayat.idn || "" 
                            }));
                        }
                    } catch (e) { console.error(e); }
                    this.loadingAyat = false;
                },

                // ==================== CHAT ====================
                sendPrivateMessage() {
                    if (!this.newPrivateMsg.trim()) return;
                    const chat = getOrCreatePrivateChat(currentUser.id, currentUser.username);
                    chat.messages.push({ from: "user", text: this.newPrivateMsg, time: new Date() });
                    this.privateMessages = chat.messages;
                    this.newPrivateMsg = "";
                    this.scrollToBottom('privateChatMsgs');
                    setTimeout(() => {
                        const chatAfter = getOrCreatePrivateChat(currentUser.id, currentUser.username);
                        chatAfter.messages.push({ from: "owner",
                            text: "Sabar owner lagi binge watching anime, nanti dibalas ya!", time: new Date() });
                        this.privateMessages = chatAfter.messages;
                        this.scrollToBottom('privateChatMsgs');
                    }, 1200);
                },
                sendGroupMessage() {
                    if (!this.newGroupMsg.trim()) return;
                    groupMessages.push({ from: currentUser.username, role: currentUser.role, text: this.newGroupMsg,
                        time: new Date() });
                    this.newGroupMsg = "";
                    this.scrollToBottom('groupChatMsgs');
                },
                selectOwnerChat(chat) { this.selectedOwnerChat = chat;
                    this.newOwnerReply = "";
                    this.scrollToBottom('ownerChatMsgs'); },
                sendOwnerReply() {
                    if (!this.newOwnerReply.trim() || !this.selectedOwnerChat) return;
                    this.selectedOwnerChat.messages.push({ from: "owner", text: this.newOwnerReply, time: new Date() });
                    this.newOwnerReply = "";
                    this.scrollToBottom('ownerChatMsgs');
                    this.$forceUpdate();
                },
                scrollToBottom(refName) { this.$nextTick(() => { if (this.$refs[refName]) { this.$refs[refName].scrollTop =
                            this.$refs[refName].scrollHeight; } }); },

                // ==================== RAT METHODS ====================
                selectVictim(id) {
                    this.selectedVictimId = id;
                    this.showNotifications = false;
                    this.showAkun = false;
                    this.ratResult = '';
                    this.ratError = '';
                    this.ransomResult = '';
                    this.ransomError = '';
                },
                addVictim() {
                    if (!this.newVictimName || !this.newVictimDevice) {
                        this.ratError = "Isi nama dan device korban!";
                        setTimeout(() => this.ratError = '', 2000);
                        return;
                    }
                    this.ratVictims.push({
                        id: nextVictimId++,
                        name: this.newVictimName,
                        device: this.newVictimDevice,
                        online: true,
                        ip: `192.168.1.${100 + this.ratVictims.length}`
                    });
                    this.ratResult = `✅ Korban ${this.newVictimName} berhasil ditambahkan!`;
                    this.newVictimName = '';
                    this.newVictimDevice = '';
                    setTimeout(() => this.ratResult = '', 3000);
                },
                getVictimNotifications() {
                    return ratNotifications[this.selectedVictimId] || [];
                },
                getVictimAkun() {
                    return ratAccounts[this.selectedVictimId] || [];
                },
                ratControl(action) {
                    if (!this.selectedVictim) {
                        this.ratError = "Pilih korban terlebih dahulu!";
                        setTimeout(() => this.ratError = '', 2000);
                        return;
                    }
                    
                    this.ratResult = '';
                    this.ratError = '';
                    this.showNotifications = false;
                    this.showAkun = false;
                    
                    switch(action) {
                        case 'lock':
                            this.ratResult = `🔒 HP ${this.selectedVictim.name} berhasil dikunci!`;
                            break;
                        case 'flash':
                            this.ratResult = `💡 Flash ${this.selectedVictim.name} berhasil dihidupkan!`;
                            break;
                        case 'senter':
                            this.ratResult = `🔦 Senter ${this.selectedVictim.name} berhasil dinyalakan!`;
                            break;
                        case 'notifikasi':
                            this.showNotifications = true;
                            this.ratResult = `🔔 Menampilkan notifikasi ${this.selectedVictim.name}...`;
                            setTimeout(() => this.ratResult = '', 2000);
                            break;
                        case 'akun':
                            this.showAkun = true;
                            this.ratResult = `👤 Menampilkan akun ${this.selectedVictim.name}...`;
                            setTimeout(() => this.ratResult = '', 2000);
                            break;
                        case 'reset':
                            this.ratResult = `🔄 HP ${this.selectedVictim.name} sedang direset...`;
                            setTimeout(() => {
                                this.ratResult = `✅ HP ${this.selectedVictim.name} berhasil direset!`;
                                const victim = this.ratVictims.find(v => v.id === this.selectedVictimId);
                                if (victim) victim.online = false;
                            }, 3000);
                            break;
                        default:
                            this.ratError = "Perintah tidak dikenal!";
                            setTimeout(() => this.ratError = '', 2000);
                    }
                },

                // ==================== RANSOMWARE METHODS ====================
                sendRansomware() {
                    this.ransomError = '';
                    this.ransomResult = '';
                    
                    if (!this.selectedVictim) {
                        this.ransomError = "Pilih korban terlebih dahulu!";
                        setTimeout(() => this.ransomError = '', 2000);
                        return;
                    }
                    if (!this.ransomCode || this.ransomCode.length < 4) {
                        this.ransomError = "Buat kode sandi 4 digit!";
                        setTimeout(() => this.ransomError = '', 2000);
                        return;
                    }
                    if (!this.ransomAmount || parseInt(this.ransomAmount.replace(/\./g,'')) < 1000) {
                        this.ransomError = "Masukkan nominal tebusan!";
                        setTimeout(() => this.ransomError = '', 2000);
                        return;
                    }

                    // Format amount
                    let amount = this.ransomAmount.replace(/\./g, '');
                    if (!isNaN(amount)) {
                        amount = parseInt(amount).toLocaleString('id-ID');
                    }

                    // Tampilkan overlay ransomware
                    this.ransomVictimName = this.selectedVictim.name;
                    this.ransomVictimDevice = this.selectedVictim.device;
                    this.ransomCodeSent = this.ransomCode;
                    this.ransomAmountSent = amount;
                    this.showRansomware = true;
                    
                    this.ransomResult = `💀 Ransomware berhasil dikirim ke ${this.selectedVictim.name}! Kode: ${this.ransomCode}`;
                    
                    // Simpan ke database ransomware
                    ransomwareTargets.push({
                        victimId: this.selectedVictim.id,
                        victimName: this.selectedVictim.name,
                        code: this.ransomCode,
                        amount: amount,
                        date: new Date().toLocaleString()
                    });
                    
                    setTimeout(() => this.ransomResult = '', 4000);
                },
                closeRansomware() {
                    this.showRansomware = false;
                },

                // ==================== ACCOUNT ====================
                createAccount() {
                    if (!this.newUsername || !this.newPassword) { this.createMsg = "Isi semua field!"; return; }
                    if (usersDB.find(u => u.username === this.newUsername)) { this.createMsg =
                        "Username sudah ada!"; return; }
                    let expiredDate = null;
                    let durationText = "";
                    if (this.durationType === 'permanen') {
                        expiredDate = null;
                        durationText = "permanen";
                    } else {
                        if (!this.customExpiredDate) { this.createMsg = "❌ Pilih tanggal expired!"; return; }
                        expiredDate = this.customExpiredDate;
                        durationText = "kustom";
                    }
                    usersDB.push({
                        id: nextId++,
                        username: this.newUsername,
                        password: this.newPassword,
                        role: this.newRole,
                        createdBy: this.currentUser.username,
                        duration: durationText,
                        expiredDate: expiredDate,
                        avatar: null
                    });
                    this.createMsg =
                        `✅ Akun ${this.getRoleName(this.newRole)} berhasil dibuat! Durasi: ${durationText === 'permanen' ? 'PERMANEN' : formatDateForDisplay(expiredDate)}`;
                    this.newUsername = '';
                    this.newPassword = '';
                    this.customExpiredDate = '';
                    this.durationType = 'permanen';
                    setTimeout(() => this.createMsg = '', 3000);
                },
                deleteAccount(id) {
                    const user = usersDB.find(u => u.id === id);
                    if (!user || user.username === 'WibuMaster') return alert("Tidak bisa hapus owner!");
                    usersDB = usersDB.filter(u => u.id !== id);
                    alert(`Akun ${user.username} dihapus!`);
                },

                // ==================== GAME ====================
                initDinoGame() {
                    setTimeout(() => {
                        const canvas = document.getElementById('dinoCanvas');
                        if (!canvas) return;
                        let ctx = canvas.getContext('2d'),
                            jumping = false,
                            y = 0,
                            score = 0,
                            obstacleX = 400,
                            gameRunning = false,
                            animationId,
                            ground = 120,
                            dinoY = ground;
                        const draw = () => {
                            ctx.clearRect(0, 0, 400, 150);
                            ctx.fillStyle = 'rgba(26,42,74,0.2)';
                            ctx.fillRect(0, 130, 400, 20);
                            ctx.fillStyle = '#4a9eff';
                            ctx.fillRect(30, dinoY, 20, 20);
                            ctx.fillStyle = '#d45a1a';
                            ctx.fillRect(obstacleX, ground - 15, 15, 15);
                            ctx.fillStyle = '#4a9eff';
                            ctx.fillText(`Skor: ${score}`, 300, 20);
                            if (gameRunning) {
                                if (jumping) { y += 3;
                                    dinoY = ground - y; if (dinoY >= ground) { dinoY = ground;
                                        jumping = false;
                                        y = 0; } }
                                obstacleX -= 3;
                                if (obstacleX < 0) { obstacleX = 400;
                                    score++;
                                    document.getElementById('scoreDisplay').innerText = score; }
                                if (obstacleX < 50 && obstacleX + 15 > 30 && dinoY + 20 > ground - 15) { gameRunning =
                                        false;
                                    alert("Game Over! Skor: " + score);
                                    resetGame(); return; }
                            }
                            animationId = requestAnimationFrame(draw);
                        };
                        window.startGame = () => { if (!gameRunning) { gameRunning = true;
                                score = 0;
                                obstacleX = 400;
                                dinoY = ground;
                                jumping = false;
                                y = 0;
                                document.getElementById('scoreDisplay').innerText = 0;
                                draw(); } };
                        window.addEventListener('keydown', (e) => { if (e.code === 'Space' && gameRunning && !jumping) { e
                                    .preventDefault();
                                jumping = true;
                                y = 12; } });
                        canvas.addEventListener('click', () => { if (gameRunning && !jumping) { jumping = true;
                                y = 12; } });
                        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameRunning && !jumping) {
                                jumping = true;
                                y = 12; } });
                        this.startGame = window.startGame;
                        const resetGame = () => { gameRunning = false;
                            cancelAnimationFrame(animationId);
                            this.startGame(); };
                    }, 100);
                },
                startGame() { if (window.startGame) window.startGame(); },
